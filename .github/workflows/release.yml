name: Release & Publish to ClawHub

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        run: |
          file_version=$(cat VERSION)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "::error::VERSION file ($file_version) does not match tag ($tag_version)"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        run: |
          # Use everything between the latest two version headers in CHANGELOG.md
          # Falls back to git log if no CHANGELOG exists
          if [ -f CHANGELOG.md ]; then
            # Extract notes for this version
            awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md > /tmp/release-notes.md
          else
            echo "Release v${{ steps.version.outputs.version }}" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Prepare publish directory
        run: |
          mkdir -p /tmp/publish-stage

          # heygen-video-producer (main skill)
          mkdir -p /tmp/publish-stage/heygen-video-producer
          cp SKILL.md /tmp/publish-stage/heygen-video-producer/SKILL.md
          cp README.md /tmp/publish-stage/heygen-video-producer/README.md
          cp LICENSE /tmp/publish-stage/heygen-video-producer/LICENSE
          cp VERSION /tmp/publish-stage/heygen-video-producer/VERSION
          cp -r references/ /tmp/publish-stage/heygen-video-producer/references/
          cp -r scripts/ /tmp/publish-stage/heygen-video-producer/scripts/
          cp video-producer/SKILL.md /tmp/publish-stage/heygen-video-producer/video-producer-skill.md

          # heygen-avatar-designer
          mkdir -p /tmp/publish-stage/heygen-avatar-designer
          cp avatar-designer/SKILL.md /tmp/publish-stage/heygen-avatar-designer/SKILL.md
          cp LICENSE /tmp/publish-stage/heygen-avatar-designer/LICENSE
          cp VERSION /tmp/publish-stage/heygen-avatar-designer/VERSION

      - name: Publish heygen-video-producer to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub publish /tmp/publish-stage/heygen-video-producer \
            --slug "heygen-video-producer" \
            --name "HeyGen Video Producer" \
            --version "${{ steps.version.outputs.version }}" \
            --changelog "Release v${{ steps.version.outputs.version }}" \
            --tags "latest"

      - name: Publish heygen-avatar-designer to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish /tmp/publish-stage/heygen-avatar-designer \
            --slug "heygen-avatar-designer" \
            --name "HeyGen Avatar Designer" \
            --version "${{ steps.version.outputs.version }}" \
            --changelog "Release v${{ steps.version.outputs.version }}" \
            --tags "latest"
